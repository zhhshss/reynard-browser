name: iOS Build (Experimental)

# Manual-only workflow that attempts the full Reynard build pipeline:
# Cargo (idevice) -> Gecko (Firefox 151) -> xcodebuild Reynard.app
#
# IMPORTANT — read before running:
#   * First run takes ~3-4 hours of macOS runner time (currently 10x billing).
#   * Subsequent runs are faster if the Gecko build cache hits.
#   * No code signing is configured here, so we cannot produce an installable
#     IPA. The goal is to validate that source builds, not ship binaries.
#   * GitHub-hosted runner disk is ~70 GB. Gecko + Firefox source + cache
#     fits, but only just; expect occasional disk-pressure failures.
#
# If you need an installable IPA, sign on a local Mac or use a paid CI
# service with code-signing support (Codemagic, Bitrise, Xcode Cloud).

on:
  # Auto-run when the workflow file itself changes. This lets the agent push
  # iterative fixes during CI debugging without requiring a manual UI click,
  # while normal source-code commits still skip the expensive macOS build.
  # Remove this trigger once the build is stable.
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:
    inputs:
      run_gecko_build:
        description: 'Build Gecko engine (uncheck to reuse cache only)'
        type: boolean
        default: true
      run_xcodebuild:
        description: 'Run xcodebuild after Gecko (unsigned)'
        type: boolean
        default: true

jobs:
  build:
    name: Build Reynard.app
    runs-on: macos-26
    timeout-minutes: 350

    env:
      FIREFOX_RELEASE_TAG_FILE: engine/release.txt
      # Firefox 151's mobile/ios target requires iOS SDK >= 26.4, which only
      # ships in Xcode 26+. macos-26 runner has Xcode 26.4.1 as default.
      MACH_BUILD_PYTHON_NATIVE_PACKAGE_SOURCE: system
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Read Firefox release tag
        id: gecko-tag
        run: |
          TAG="$(tr -d '\000\r' < "${{ env.FIREFOX_RELEASE_TAG_FILE }}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          echo "Firefox tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Select Xcode 26.4.1 (iOS SDK 26.4)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Verify Xcode and iOS SDK
        run: |
          xcodebuild -version
          echo "---"
          xcrun --sdk iphoneos --show-sdk-version
          echo "---"
          xcodebuild -showsdks | grep -i ios || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install build dependencies
        run: |
          brew update
          # ldid: ad-hoc signs dylibs the Gecko build copies in (Reynard's AddGecko.sh).
          # lld:  used by `clang -fuse-ld=lld` during Gecko link steps.
          brew install ldid lld
          # zstandard: mach uses .tar.zst for toolchain artifacts (clang/etc.).
          # Without it, mach silently fails to unpack toolchain tarballs and the
          # subsequent `mach build` errors with "Failed to find an adequate linker".
          python3 -m pip install --upgrade pip
          python3 -m pip install zstandard

      - name: Cache Firefox source submodule
        id: cache-firefox-src
        uses: actions/cache@v4
        with:
          path: engine/firefox
          # Cache the entire shallow checkout at this exact tag. Switching
          # tags invalidates automatically.
          key: firefox-src-${{ steps.gecko-tag.outputs.tag }}-v1

      - name: Cache support/idevice submodule
        id: cache-idevice-src
        uses: actions/cache@v4
        with:
          path: support/idevice
          key: idevice-src-${{ hashFiles('.gitmodules') }}-v1

      - name: Initialize idevice submodule if cache miss
        if: steps.cache-idevice-src.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth 1 support/idevice

      - name: Fetch and checkout Firefox source if cache miss
        if: steps.cache-firefox-src.outputs.cache-hit != 'true'
        run: |
          ./tools/development/update-gecko.sh

      - name: Apply patches to Firefox source
        run: |
          # apply-patches.sh is interactive on conflict. In CI, we want a
          # failure to be loud rather than block on stdin, so guard the
          # state up front: if patches are already applied, skip.
          if git -C engine/firefox diff --quiet; then
            ./tools/development/apply-patches.sh < /dev/null
          else
            echo "engine/firefox already has working-tree modifications; assuming patches applied."
          fi

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            support/idevice/target
          key: cargo-${{ runner.os }}-${{ hashFiles('support/idevice/**/Cargo.lock', 'support/idevice/**/Cargo.toml') }}-v2
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Rust-based build tools (cbindgen)
        # cbindgen generates C headers from Rust sources during Gecko configure.
        # `mach bootstrap` normally provides it, but we skip bootstrap to avoid
        # downloading ~3 GB of Android NDK/SDK we don't need. Placed AFTER the
        # cargo cache restore so subsequent runs reuse ~/.cargo/bin/cbindgen.
        run: |
          if ! command -v cbindgen >/dev/null 2>&1; then
            cargo install --locked cbindgen
          fi
          cbindgen --version

      - name: Build idevice FFI library
        run: |
          ./tools/development/build-idevice.sh

      - name: Cache Gecko build directory
        if: ${{ github.event_name == 'push' || inputs.run_gecko_build }}
        id: cache-gecko-build
        uses: actions/cache@v4
        with:
          # Gecko's object dir lives at engine/firefox/obj-* by default.
          # Caching the whole thing is expensive but the only way to make
          # subsequent runs fast.
          path: |
            engine/firefox/obj-aarch64-apple-ios
            ~/.mozbuild
          key: gecko-build-${{ runner.os }}-${{ steps.gecko-tag.outputs.tag }}-${{ hashFiles('patches/**/*.patch', 'tools/development/build-gecko.sh') }}
          restore-keys: |
            gecko-build-${{ runner.os }}-${{ steps.gecko-tag.outputs.tag }}-

      - name: Fetch Mozilla toolchain artifacts (clang + friends)
        if: ${{ github.event_name == 'push' || inputs.run_gecko_build }}
        working-directory: engine/firefox
        run: |
          # We skip `./mach bootstrap` entirely because:
          #   * Its mobile-android profile downloads ~3 GB of Android NDK/SDK/JDK
          #     we never use for the iOS target, and license prompts can fail on CI.
          #   * `mach build` itself triggers `mach configure`, which in turn calls
          #     `mach artifact toolchain` to pull whatever clang/cbindgen/nasm/etc.
          #     the current platform needs. As long as zstandard is installed and
          #     the network reaches firefoxci.taskcluster-artifacts.net, that's
          #     all we need to bootstrap on a fresh runner.
          #
          # We do still call `mach configure` once up-front so toolchain failures
          # surface here (not buried 30 seconds into the build step), and so the
          # toolchain dir gets warmed before the cache-saving step at the end.
          ./mach configure 2>&1 | tail -200

      - name: Build Gecko engine
        if: ${{ github.event_name == 'push' || inputs.run_gecko_build }}
        run: |
          ./tools/development/build-gecko.sh

      - name: Inspect Gecko output
        if: ${{ github.event_name == 'push' || inputs.run_gecko_build }}
        run: |
          OBJDIR="engine/firefox/obj-aarch64-apple-ios"
          if [ ! -d "$OBJDIR/dist/bin" ]; then
            echo "::error::Gecko build did not produce $OBJDIR/dist/bin"
            exit 1
          fi
          echo "Gecko dist/bin contents:"
          ls -la "$OBJDIR/dist/bin" | head -40

      - name: Run xcodebuild (unsigned)
        if: ${{ github.event_name == 'push' || inputs.run_xcodebuild }}
        working-directory: browser
        env:
          GECKO_DIST: ${{ github.workspace }}/engine/firefox/obj-aarch64-apple-ios/dist
        run: |
          set -o pipefail
          # Use ad-hoc signing ("-") for the host app AND its embedded
          # extensions. iOS app extensions (.appex) must be signed with the
          # same identity as their parent app or xcodebuild's
          # ValidateEmbeddedBinary phase rejects the build. With "-" applied
          # uniformly through CODE_SIGN_IDENTITY *and* EXPANDED_CODE_SIGN_IDENTITY,
          # the appex bundles and the host app all share a single fake
          # identity, and the embedded-binary check passes.
          #
          # We previously set CODE_SIGN_IDENTITY="" with || true masking the
          # error — that produced an unusable .app whose extensions failed to
          # match. The fix: ad-hoc sign everything, no error masking.
          XCBUILD_ARGS=(
            -project Reynard.xcodeproj
            -scheme Reynard
            -configuration Release
            -destination 'generic/platform=iOS'
            -derivedDataPath build
            CODE_SIGN_IDENTITY=-
            CODE_SIGN_STYLE=Manual
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGNING_ALLOWED=YES
            AD_HOC_CODE_SIGNING_ALLOWED=YES
            DEVELOPMENT_TEAM=""
            PROVISIONING_PROFILE=""
            PROVISIONING_PROFILE_SPECIFIER=""
            EXPANDED_CODE_SIGN_IDENTITY="-"
            GECKO_DIST="$GECKO_DIST"
          )
          if command -v xcbeautify >/dev/null 2>&1; then
            xcodebuild "${XCBUILD_ARGS[@]}" | xcbeautify
          else
            xcodebuild "${XCBUILD_ARGS[@]}"
          fi

      - name: Package .app into .ipa and .tipa
        if: ${{ github.event_name == 'push' || inputs.run_xcodebuild }}
        working-directory: browser/build/Build/Products/Release-iphoneos
        env:
          ROOT_DIR: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -d "Reynard.app" ]; then
            echo "::error::Reynard.app not produced by xcodebuild"
            ls -la
            exit 1
          fi

          # ---------- 1. Plain .ipa (no special entitlements) ----------
          # AltStore/SideStore users will re-sign this with their Apple ID.
          rm -rf Payload Reynard.ipa Reynard-TrollStore.tipa
          mkdir Payload
          cp -R Reynard.app Payload/Reynard.app
          zip -qry Reynard.ipa Payload -x "._*" -x ".DS_Store" -x "__MACOSX"

          # ---------- 2. Compile the ptrace_jit helper binary ----------
          # This tiny C helper requests JIT memory via ptrace tricks; it's
          # invoked by Reynard on launch when running under TrollStore.
          # Without it, the .tipa works but JIT is unavailable.
          CLANG_PATH="$(xcrun --sdk iphoneos --find clang)"
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
          PTRACE_SRC="$ROOT_DIR/browser/Reynard/TrollStore/JIT/ptrace_jit.c"
          PTRACE_OUT="Payload/Reynard.app/ptrace_jit"
          "$CLANG_PATH" \
            -arch arm64 \
            -isysroot "$SDK_PATH" \
            -miphoneos-version-min=13.0 \
            -Os \
            "$PTRACE_SRC" \
            -o "$PTRACE_OUT"
          chmod 0755 "$PTRACE_OUT"

          # ---------- 3. Inject .private entitlements with ldid ----------
          # ldid replaces the existing ad-hoc signature with a new ad-hoc
          # signature that embeds these entitlements. TrollStore detects
          # them at install time and shows the "Special Permissions" prompt.
          PRIV_MAIN="$ROOT_DIR/browser/Reynard/Entitlements/Reynard.private.entitlements"
          PRIV_HELPER="$ROOT_DIR/browser/Helper/Entitlements/Reynard-Helper.private.entitlements"
          PRIV_PTRACE="$ROOT_DIR/browser/Reynard/TrollStore/JIT/ptrace_jit.entitlements"
          ldid -S"$PRIV_PTRACE" "$PTRACE_OUT"
          ldid -S"$PRIV_MAIN" "Payload/Reynard.app/Reynard"
          ldid -S"$PRIV_HELPER" "Payload/Reynard.app/PlugIns/Reynard Helper.appex/Reynard Helper"

          # ---------- 4. Zip the TrollStore bundle ----------
          zip -qry Reynard-TrollStore.tipa Payload -x "._*" -x ".DS_Store" -x "__MACOSX"

          ls -lh Reynard.ipa Reynard-TrollStore.tipa
          # Sanity check: both bundles must be plausibly sized.
          MIN_BYTES=$((10 * 1024 * 1024))
          for f in Reynard.ipa Reynard-TrollStore.tipa; do
            SIZE=$(stat -f%z "$f")
            if [ "$SIZE" -lt "$MIN_BYTES" ]; then
              echo "::error::$f is only ${SIZE} bytes — build likely produced an empty .app"
              exit 1
            fi
          done

          # ---------- 5. Verify the entitlements landed ----------
          echo "=== Entitlements embedded in Reynard binary ==="
          ldid -e "Payload/Reynard.app/Reynard" || true
          echo "=== Entitlements embedded in ptrace_jit binary ==="
          ldid -e "Payload/Reynard.app/ptrace_jit" || true

      - name: Upload installable bundles (.ipa and .tipa)
        if: ${{ github.event_name == 'push' || inputs.run_xcodebuild }}
        uses: actions/upload-artifact@v4
        with:
          name: Reynard-unsigned-installable
          path: |
            browser/build/Build/Products/Release-iphoneos/Reynard.ipa
            browser/build/Build/Products/Release-iphoneos/Reynard-TrollStore.tipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload raw .app bundle (for debugging)
        if: ${{ github.event_name == 'push' || inputs.run_xcodebuild }}
        uses: actions/upload-artifact@v4
        with:
          name: Reynard-unsigned-app
          path: browser/build/Build/Products/Release-iphoneos/Reynard.app
          if-no-files-found: warn
          retention-days: 7

